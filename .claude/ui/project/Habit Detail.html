<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haba-Chewoah · Habit + Log Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: Inter, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand-tokens.jsx"></script>
<script type="text/babel" src="habit-detail.jsx"></script>
<script type="text/babel" src="habit-log-detail.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="habit" title="/habit/:id — habit detail" subtitle="Tracker view: streak, heatmap, recent logs. Own = log + edit. Other = chew-out + cheer.">
        <DCArtboard id="habit-own" label="Own habit · cold plunge · day 47" width={430} height={920}>
          <HabitDetail isOwn={true} />
        </DCArtboard>
        <DCArtboard id="habit-other" label="Friend's habit · kira · day 119" width={430} height={920}>
          <HabitDetail isOwn={false} />
        </DCArtboard>
      </DCSection>
      <DCSection id="log" title="/habit-log/:id — log detail + comments" subtitle="Photo/video first, then caption, reactions, threaded comments. Own = delete affordances.">
        <DCArtboard id="log-own" label="Your log · day 47" width={430} height={920}>
          <HabitLogDetail isOwn={true} />
        </DCArtboard>
        <DCArtboard id="log-other" label="Friend's log · day 119" width={430} height={920}>
          <HabitLogDetail isOwn={false} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
