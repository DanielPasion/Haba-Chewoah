<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haba-Chewoah · Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: Inter, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand-tokens.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="d-home" title="Desktop · home" subtitle="3-column: nav · feed · activity rail. Logs render as horizontal cards with side-by-side media + content.">
        <DCArtboard id="dhome" label="/  — home feed" width={1440} height={900}>
          <DHome />
        </DCArtboard>
      </DCSection>
      <DCSection id="d-profile" title="Desktop · profile" subtitle="Banner + identity row + tabs. 4-up habit grid uses the wider canvas.">
        <DCArtboard id="dprofile-own" label="/profile/me" width={1440} height={1100}>
          <DProfile isOwn={true} />
        </DCArtboard>
        <DCArtboard id="dprofile-other" label="/profile/kira" width={1440} height={1100}>
          <DProfile isOwn={false} />
        </DCArtboard>
      </DCSection>
      <DCSection id="d-habit" title="Desktop · habit detail" subtitle="Hero with huge day count + dare. Two-col: heatmap + recent logs / stats sidebar.">
        <DCArtboard id="dhabit" label="/habit/h1 · cold plunge" width={1440} height={1100}>
          <DHabitDetail />
        </DCArtboard>
      </DCSection>
      <DCSection id="d-log" title="Desktop · log detail (lightbox)" subtitle="Modal opens over the feed — Instagram/Twitter-style. Media on left, comments thread on right.">
        <DCArtboard id="dlog" label="/habit-log/l1 over feed" width={1440} height={900}>
          <DLogDetail />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
