<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haba-Chewoah · + Flows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: Inter, system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand-tokens.jsx"></script>
<script type="text/babel" src="add-flows.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="chooser" title="Tap + → action sheet" subtitle="Bottom-sheet chooser. Two paths: log a habit (with daily-due hint) or start a new one.">
        <DCArtboard id="add-sheet" label="Action sheet over feed" width={430} height={920}>
          <AddSheet />
        </DCArtboard>
      </DCSection>
      <DCSection id="log" title="Path A — log a habit" subtitle="Pick from your active habits, set mood, attach proof, write a note, choose visibility.">
        <DCArtboard id="log-flow" label="Log a habit · cold plunge selected" width={430} height={920}>
          <LogFlow />
        </DCArtboard>
      </DCSection>
      <DCSection id="new" title="Path B — start a new habit" subtitle="Lead with the dare. Then name, frequency, duration, reminder, visibility.">
        <DCArtboard id="new-habit" label="New habit · the dare comes first" width={430} height={920}>
          <NewHabitFlow />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
